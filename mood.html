<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Life — Mind</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="css/pages/mood.css" />

  <!-- Firebase compat SDK (sync) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

  <!-- Core -->
  <script defer src="js/core/utils.js"></script>
  <script defer src="js/core/storage.js"></script>
  <script defer src="js/core/theme.js"></script>
  <script defer src="js/core/i18n.js"></script>
  <script defer src="js/core/firebase-init.js"></script>
  <script defer src="js/core/db.js"></script>
  <script defer src="js/core/nav.js"></script>
  <script defer src="js/core/core.js"></script>

  <!-- Page -->
  <script defer src="js/pages/mood.js"></script>

  <!-- Bootstrap -->
  <script defer src="js/app.js"></script>
</head>

<body id="moodPage" data-accent="mood">
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="home.html" aria-label="Overview">
      <div class="mark">H</div>
      <div>
        <div class="t" data-i18n="brand.title">Hbit</div>
        <div class="s" data-i18n="brand.sub">Everyday dashboard</div>
      </div>
    </a>

    <div class="title" data-i18n="mood.title">State of mind</div>

    <div class="actions">
      <a class="back-btn" href="home.html"><span class="arr">←</span> <span data-i18n="btn.back">Overview</span></a>

      <button class="btn" id="langToggle" type="button">
        <span id="langLabel">FR</span>
      </button>

      <button class="btn" id="themeToggle" type="button">
        <span data-i18n="btn.theme">Theme</span>
        <span id="themeHint" class="hint-mini"></span>
      </button>

      <a class="avatar" href="profile.html" aria-label="Profile">D</a>
    </div>
  </div>
</header>

<main class="container">
  <div class="grid">

    <!-- Today -->
    <section class="card span-12" id="moodTodayCard">
      <div class="mood-top">
        <div class="mood-top-left">
          <div class="tag"><span class="dot"></span><span data-i18n="mood.today">Today</span></div>
          <div class="sub mood-leadin" data-i18n="mood.leadin">
            Track your state of mind with simple levels. Auto-saves while you edit.
          </div>
        </div>

        <div class="mood-top-right">
          <button class="btn" id="moodSave" type="button" data-i18n="btn.save">Save</button>
          <button class="btn danger" id="moodClear" type="button" data-i18n="btn.clear">Clear</button>
          <button class="btn" id="moodResetToday" type="button" data-i18n="mood.reset">Reset</button>
          <div class="pill" id="moodOverallPill">—</div>
        </div>
      </div>

      <div class="mood-layout">
        <!-- LEFT: sliders -->
        <div class="mood-sliders">
          <div class="mood-card">
            <div class="mood-head">
              <div class="mood-label" data-i18n="mood.dim.mood">Mood</div>
              <div class="pill mood7-pill" id="pillMood7">—</div>
            </div>
            <input id="rngMood7" type="range" min="1" max="5" value="3" />
            <div class="sub" id="capMood7">—</div>
          </div>

          <div class="mood-card">
            <div class="mood-head">
              <div class="mood-label" data-i18n="mood.dim.stress">Stress</div>
              <div class="pill mood7-pill" id="pillStress7">—</div>
            </div>
            <input id="rngStress7" type="range" min="1" max="5" value="3" />
            <div class="sub" id="capStress7">—</div>
          </div>

          <div class="mood-card">
            <div class="mood-head">
              <div class="mood-label" data-i18n="mood.dim.energy">Energy</div>
              <div class="pill mood7-pill" id="pillEnergy7">—</div>
            </div>
            <input id="rngEnergy7" type="range" min="1" max="5" value="3" />
            <div class="sub" id="capEnergy7">—</div>
          </div>

          <div class="mood-card">
            <div class="mood-head">
              <div class="mood-label" data-i18n="mood.dim.focus">Focus</div>
              <div class="pill mood7-pill" id="pillFocus7">—</div>
            </div>
            <input id="rngFocus7" type="range" min="1" max="5" value="3" />
            <div class="sub" id="capFocus7">—</div>
          </div>

          <div class="mood-card">
            <div class="mood-head">
              <div class="mood-label" data-i18n="mood.dim.social">Social</div>
              <div class="pill mood7-pill" id="pillSocial7">—</div>
            </div>
            <input id="rngSocial7" type="range" min="1" max="5" value="3" />
            <div class="sub" id="capSocial7">—</div>
          </div>
        </div>

        <!-- RIGHT: emotion/impact/note + ring -->
        <div class="mood-side">
          <div class="mood-side-head">
            <div>
              <div class="mood-label" data-i18n="mood.emotion.title">Emotion</div>
              <div class="sub" id="emotionHint" data-i18n="mood.emotion.hint">
                Pick the emotion that fits best (suggestions update with your mood).
              </div>
            </div>

            <div class="mood-ring" id="moodRing" style="--deg:0deg;">
              <div class="mood-ring-center">
                <div class="mood-ring-top" data-i18n="mood.overall">Overall</div>
                <div class="mood-ring-mid" id="ringScore">—</div>
              </div>
            </div>
          </div>

          <div class="mood-row">
            <div class="pill mood7-pill" id="pillEmotion">—</div>
            <button class="btn small" id="emotionMoreBtn" type="button" data-i18n="btn.showMore">Show more</button>
          </div>

          <div class="chips" id="emotionChips"></div>

          <div class="mood-row mood-row-imp">
            <div class="tag"><span class="dot"></span><span data-i18n="mood.impact.title">Most impact</span></div>
            <div class="pill" id="pillImpact">—</div>
            <button class="btn small" id="impactMoreBtn" type="button" data-i18n="btn.showMore">Show more</button>
          </div>

          <div class="chips" id="impactChips"></div>

          <div class="field">
            <label for="moodNote" data-i18n="mood.note">Notes</label>
            <textarea id="moodNote" class="ui-input" rows="4" placeholder="Write anything..."></textarea>
          </div>
        </div>
      </div>
    </section>

    <!-- History -->
    <section class="card span-12" id="moodHistoryCard">
      <div class="row">
        <div class="tag"><span class="dot"></span><span data-i18n="mood.history">History</span></div>
        <div class="pill" id="moodHistoryCount">0</div>
      </div>

      <div id="moodHistory" class="mood-history"></div>
    </section>

  </div>
</main>
</body>
</html>
