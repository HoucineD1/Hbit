<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hbit — Profile</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="css/pages/profile-settings.css" />

  <!-- Firebase compat SDK (sync) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

  <!-- Core -->
  <script defer src="js/core/utils.js"></script>
  <script defer src="js/core/storage.js"></script>
  <script defer src="js/core/theme.js"></script>
  <script defer src="js/core/i18n.js"></script>
  <script defer src="js/core/firebase-init.js"></script>
  <script defer src="js/core/db.js"></script>
  <script defer src="js/core/nav.js"></script>
  <script defer src="js/core/core.js"></script>

  <!-- Page -->
  <script defer src="js/pages/profile.js"></script>
  <script defer src="js/app.js"></script>
</head>

<body id="profilePage">

  <!-- ══ Topbar ══════════════════════════════════════════ -->
  <header class="topbar">
    <div class="topbar-inner">
      <a class="btn icon-btn" href="home.html" aria-label="Back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </a>
      <h1 class="pf-topbar-title">Profile</h1>
      <button class="btn pf-save-top" id="saveTopBtn" type="button">Save</button>
    </div>
  </header>

  <!-- ══ Main ════════════════════════════════════════════ -->
  <main class="container">
    <div class="grid">

      <!-- ── Avatar + name ─────────────────────────────── -->
      <div class="card pf-hero span-12">
        <div class="pf-avatar" id="pfAvatar">H</div>
        <div class="pf-hero-info">
          <div class="pf-hero-name" id="pfHeroName">Loading…</div>
          <div class="pf-hero-meta" id="pfHeroMeta">—</div>
        </div>
      </div>

      <!-- ── Edit form ──────────────────────────────────── -->
      <div class="card pf-form-card span-12">
        <h2 class="pf-section-title">Personal Info</h2>

        <div class="pf-field">
          <label class="pf-label" for="pfFullName">Full Name</label>
          <input class="pf-input" id="pfFullName" type="text"
                 placeholder="John Doe" autocomplete="name" />
        </div>

        <div class="pf-field">
          <label class="pf-label" for="pfUsername">Username</label>
          <div class="pf-input-wrap">
            <span class="pf-input-prefix">@</span>
            <input class="pf-input pf-input--prefixed" id="pfUsername" type="text"
                   placeholder="johndoe" autocomplete="username" />
          </div>
        </div>

        <div class="pf-row-2">
          <div class="pf-field">
            <label class="pf-label" for="pfAge">Age</label>
            <input class="pf-input" id="pfAge" type="number"
                   min="1" max="120" placeholder="—" />
          </div>
          <div class="pf-field">
            <label class="pf-label" for="pfGender">Gender</label>
            <select class="pf-input pf-select" id="pfGender">
              <option value="">Prefer not to say</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="non-binary">Non-binary</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <div class="pf-field">
          <label class="pf-label" for="pfBio">Bio</label>
          <textarea class="pf-input pf-textarea" id="pfBio"
                    rows="3" maxlength="200"
                    placeholder="Tell us a little about yourself…"></textarea>
          <span class="pf-char-count"><span id="pfBioCount">0</span> / 200</span>
        </div>

        <div id="pfSaveMsg" class="pf-save-msg hidden"></div>

        <button class="pf-save-btn" id="saveProfileBtn" type="button">
          <span id="saveBtnLabel">Save Changes</span>
          <span class="pf-spinner hidden" id="saveSpinner"></span>
        </button>
      </div>

      <!-- ── Stats ─────────────────────────────────────── -->
      <div class="card pf-stats-card span-12">
        <h2 class="pf-section-title">Your Progress</h2>
        <div class="pf-stats-grid">
          <div class="pf-stat" style="--accent:var(--habit)">
            <span class="pf-stat-value" id="psHabits">0</span>
            <span class="pf-stat-label">Habits</span>
          </div>
          <div class="pf-stat" style="--accent:var(--habit)">
            <span class="pf-stat-value" id="psStreak">0</span>
            <span class="pf-stat-label">Day Streak</span>
          </div>
          <div class="pf-stat" style="--accent:var(--sleep)">
            <span class="pf-stat-value" id="psSleep">0</span>
            <span class="pf-stat-label">Sleep Logs</span>
          </div>
          <div class="pf-stat" style="--accent:var(--mind)">
            <span class="pf-stat-value" id="psMood">0</span>
            <span class="pf-stat-label">Mood Logs</span>
          </div>
          <div class="pf-stat" style="--accent:#ff8c00">
            <span class="pf-stat-value" id="psBudget">0</span>
            <span class="pf-stat-label">Transactions</span>
          </div>
        </div>
      </div>

      <!-- ── Account info ───────────────────────────────── -->
      <div class="card pf-account-card span-12">
        <h2 class="pf-section-title">Account</h2>

        <div class="pf-account-row">
          <span class="pf-account-key">Email</span>
          <span class="pf-account-val" id="pfEmailDisplay">—</span>
        </div>
        <div class="pf-account-row">
          <span class="pf-account-key">Sign-in method</span>
          <span class="pf-account-val" id="pfProviderDisplay">—</span>
        </div>
        <div class="pf-account-row">
          <span class="pf-account-key">Member since</span>
          <span class="pf-account-val" id="pfCreatedAt">—</span>
        </div>

        <button class="pf-logout-btn" id="pfLogoutBtn" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Log Out
        </button>
      </div>

    </div>
  </main>

  <!-- ══ Bottom navigation ════════════════════════════════ -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <div class="items">
      <a class="nav-item" data-nav="overview" href="home.html">
        <span class="icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </span>
        <span class="label">Home</span>
      </a>
      <a class="nav-item" data-nav="habits" href="habits.html">
        <span class="icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 11 12 14 22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
        </span>
        <span class="label">Habits</span>
      </a>
      <a class="nav-item" data-nav="budget" href="budget.html">
        <span class="icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </span>
        <span class="label">Budget</span>
      </a>
      <a class="nav-item" data-nav="sleep" href="sleep.html">
        <span class="icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </span>
        <span class="label">Sleep</span>
      </a>
      <a class="nav-item" data-nav="mood" href="mood.html">
        <span class="icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
            <line x1="9" y1="9" x2="9.01" y2="9" stroke-width="2.5"/>
            <line x1="15" y1="9" x2="15.01" y2="9" stroke-width="2.5"/>
          </svg>
        </span>
        <span class="label">Mood</span>
      </a>
    </div>
  </nav>

</body>
</html>
